---
- name: Create Odoo compose directory
  ansible.builtin.file:
    path: "{{ odoo_compose_dir }}"
    state: directory
    mode: '0755'

- name: Create local directories for volumes if specified
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ postgres_local_path }}"
    - "{{ odoo_data_local_path }}"
    - "{{ odoo_addons_local_path }}"
    - "{{ odoo_config_local_path }}"
  when: item != ""

- name: Deploy Odoo docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ odoo_compose_dir }}/docker-compose.yml"
    mode: '0644'
  notify: Restart Odoo stack

- name: Start Odoo stack
  docker_compose_v2:
    project_src: "{{ odoo_compose_dir }}"
    state: present

- name: Wait for Odoo to be ready
  ansible.builtin.wait_for:
    port: "{{ odoo_port }}"
    delay: 10
    timeout: 120

- name: Verify Odoo is accessible
  ansible.builtin.uri:
    url: "http://localhost:{{ odoo_port }}"
    status_code: 200
  register: odoo_health
  retries: 5
  delay: 10
  until: odoo_health.status == 200

